# 模板与爬虫任务映射配置
# 版本: 1.0
# 更新时间: 2026-01-31

version: "1.0"
update_time: "2026-01-31"

# 全局配置
global:
  storage: csv
  use_proxy: true
  get_comments: true
  login: qrcode
  base_path: "/workspace/projects/media-crawler"

# 模板配置
templates:
  # AI工具测评模板
  - template_id: ai-tool
    template_name: AI工具测评
    description: 展示AI工具的核心功能和使用效果
    
    crawler_tasks:
      - name: "AI工具_抖音_每日"
        platform: douyin
        mode: search
        keywords:
          - "AI工具"
          - "人工智能"
          - "ChatGPT"
          - "AI绘画"
          - "AI写作"
        schedule:
          type: daily
          time: "02:00"
        filter:
          min_likes: 10000
          publish_days: 7
      
      - name: "AI工具_小红书_每日"
        platform: xhs
        mode: search
        keywords:
          - "AI工具测评"
          - "人工智能推荐"
          - "AI神器"
          - "效率工具"
        schedule:
          type: daily
          time: "02:30"
        filter:
          min_likes: 5000
          publish_days: 7
      
      - name: "AI工具_知乎_每日"
        platform: zhihu
        mode: search
        keywords:
          - "AI工具推荐"
          - "人工智能应用"
          - "ChatGPT使用"
        schedule:
          type: daily
          time: "03:00"
        filter:
          min_likes: 1000
          publish_days: 7
    
    analysis:
      enabled: true
      frequency: daily

  # 副业变现模板
  - template_id: side-hustle
    template_name: 副业变现
    description: 分享副业赚钱的方法和技巧
    
    crawler_tasks:
      - name: "副业_抖音_每日"
        platform: douyin
        mode: search
