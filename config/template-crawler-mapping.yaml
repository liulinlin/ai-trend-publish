          - "副业赚钱"
          - "兼职变现"
          - "在家赚钱"
          - "副业推荐"
          - "赚钱方法"
        schedule:
          type: daily
          time: "03:30"
        filter:
          min_likes: 10000
          publish_days: 7
      
      - name: "副业_小红书_每日"
        platform: xhs
        mode: search
        keywords:
          - "副业分享"
          - "兼职经验"
          - "赚钱技巧"
        schedule:
          type: daily
          time: "04:00"
        filter:
          min_likes: 5000
          publish_days: 7
    
    analysis:
      enabled: true
      frequency: daily

  # 生活小技巧模板
